<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeRush — Speed Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e2e0f0;
    --muted: #4a4870;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #f43f5e;
    --yellow: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .logo em { color: var(--accent2); font-style: normal; }

  /* Controls Row */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
    align-items: center;
  }
  .group-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-right: 2px;
  }
  .chip-group { display: flex; gap: 6px; }
  .chip {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.active-time { background: var(--accent2); border-color: var(--accent2); color: #000; }
  .divider { width: 1px; height: 28px; background: var(--border); margin: 0 6px; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }

  /* Timer circle */
  .timer-wrap { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .timer-circle {
    position: relative;
    width: 56px; height: 56px;
  }
  .timer-circle svg { transform: rotate(-90deg); }
  .timer-circle circle { fill: none; stroke-width: 4; }
  .timer-bg { stroke: var(--border); }
  .timer-fg {
    stroke: var(--accent2);
    stroke-dasharray: 144;
    stroke-dashoffset: 0;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
  }

  /* Text area */
  .text-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 20px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
    cursor: text;
    min-height: 140px;
  }
  .text-box.focused { border-color: var(--accent); }
  .text-box.error { border-color: var(--red); }

  #word-display {
    font-family: 'Space Mono', monospace;
    font-size: 1.25rem;
    line-height: 2.2;
    letter-spacing: 0.02em;
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .word { display: inline-block; margin-right: 10px; position: relative; }
  .char { display: inline-block; transition: color 0.1s; }
  .char.correct { color: var(--green); }
  .char.wrong { color: var(--red); text-decoration: underline wavy var(--red); }
  .char.current { color: var(--accent2); }
  .char.pending { color: var(--muted); }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.3em;
    background: var(--accent2);
    vertical-align: text-bottom;
    border-radius: 2px;
    animation: blink 1s step-end infinite;
    margin-left: -2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Hidden input */
  #hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    top: 0; left: 0;
    width: 1px; height: 1px;
  }

  /* Click to start */
  .start-hint {
    text-align: center;
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(4px);
    border-radius: 14px;
    z-index: 2;
    transition: opacity 0.3s;
  }
  .start-hint.hidden { opacity: 0; pointer-events: none; }
  .start-hint-icon { font-size: 2.5rem; }
  .start-hint-text { font-size: 1rem; color: var(--muted); }
  .start-hint kbd {
    display: inline-block;
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
  }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; }
  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* Results overlay */
  #results-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #results-overlay.show { display: flex; }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 48px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } }

  .results-title {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .results-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .result-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .result-item .val {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
  }
  .result-item .lbl {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 4px;
  }
  .grade-badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.8rem;
    margin-bottom: 24px;
  }

  /* Difficulty label */
  .diff-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 4px 12px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .diff-easy { background: rgba(16,185,129,0.15); color: var(--green); }
  .diff-medium { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .diff-hard { background: rgba(244,63,94,0.15); color: var(--red); }

  @media (max-width: 600px) {
    #word-display { font-size: 1rem; }
    .stats-bar { flex-wrap: wrap; }
    .results-grid { grid-template-columns: 1fr 1fr; }
    .results-card { padding: 28px 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Type<span>Rush</span><em>.</em></div>
    <div id="diff-indicator"></div>
  </header>

  <!-- Controls -->
  <div class="controls">
    <span class="group-label">Level</span>
    <div class="chip-group">
      <button class="chip active" data-diff="easy" onclick="setDifficulty('easy')">Easy</button>
      <button class="chip" data-diff="medium" onclick="setDifficulty('medium')">Medium</button>
      <button class="chip" data-diff="hard" onclick="setDifficulty('hard')">Hard</button>
    </div>
    <div class="divider"></div>
    <span class="group-label">Time</span>
    <div class="chip-group">
      <button class="chip active-time" data-time="15" onclick="setTime(15)">15s</button>
      <button class="chip" data-time="30" onclick="setTime(30)">30s</button>
      <button class="chip" data-time="60" onclick="setTime(60)">60s</button>
      <button class="chip" data-time="120" onclick="setTime(120)">2m</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="wpm-val">—</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="acc-val">—</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="words-val">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="chars-val">0</div>
      <div class="stat-label">Chars</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle class="timer-bg" cx="28" cy="28" r="23"/>
          <circle class="timer-fg" id="timer-ring" cx="28" cy="28" r="23"/>
        </svg>
        <div class="timer-num" id="timer-display">—</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- Text Box -->
  <div class="text-box" id="text-box" onclick="focusInput()">
    <div id="word-display"></div>
    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="start-hint" id="start-hint">
      <div class="start-hint-icon">⌨️</div>
      <div class="start-hint-text">Click here or press <kbd>Tab</kbd> to start</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="restartTest()">↺ Restart</button>
    <button class="btn btn-primary" onclick="newTest()">New Test →</button>
  </div>
</div>

<!-- Results Overlay -->
<div id="results-overlay">
  <div class="results-card">
    <div class="results-title" id="res-title">🎉 Test Complete!</div>
    <div class="results-subtitle" id="res-sub"></div>
    <div id="res-grade"></div>
    <div class="results-grid">
      <div class="result-item"><div class="val" id="res-wpm">0</div><div class="lbl">WPM</div></div>
      <div class="result-item"><div class="val" id="res-acc">0%</div><div class="lbl">Accuracy</div></div>
      <div class="result-item"><div class="val" id="res-words">0</div><div class="lbl">Words</div></div>
      <div class="result-item"><div class="val" id="res-errors">0</div><div class="lbl">Errors</div></div>
    </div>
    <div class="btn-row" style="justify-content:center; gap: 12px;">
      <button class="btn btn-ghost" onclick="closeResults()">← Back</button>
      <button class="btn btn-primary" onclick="newTest(); closeResults()">Try Again</button>
    </div>
  </div>
</div>

<script>
// ─── Word Banks ───────────────────────────────────────────────
const WORDS = {
  easy: [
    'the','and','for','are','but','not','you','all','any','can',
    'had','her','was','one','our','out','day','get','has','him',
    'his','how','man','new','now','old','see','two','way','who',
    'boy','did','its','let','put','say','she','too','use','big',
    'cat','dog','run','sit','hot','sun','red','car','top','cup',
    'hat','pen','bag','bed','arm','eye','far','few','got','job',
    'key','law','lot','map','net','off','pay','set','six','ten',
    'try','win','yes','ago','air','ate','bad','bit','buy','cut',
    'dry','ear','end','fan','fix','fly','fun','gas','hit','ice'
  ],
  medium: [
    'about','after','again','below','could','every','first','found',
    'great','house','large','learn','never','other','place','plant',
    'point','right','small','sound','spell','still','study','their',
    'there','these','think','three','water','where','which','while',
    'world','would','write','above','along','begin','bring','build',
    'carry','cause','comes','cover','cross','earth','eight','front',
    'given','going','group','heavy','horse','image','known','later',
    'light','might','music','night','often','order','paper','parts',
    'power','press','reach','ready','river','round','sense','serve'
  ],
  hard: [
    'acquire','beneath','capable','deliberate','eloquent','fascinate',
    'genuine','hazardous','illustrate','justify','knowledgeable','luminous',
    'magnificent','necessary','obscure','persevere','quintessential',
    'resilient','scrutinize','tranquility','ubiquitous','vulnerable',
    'whisper','exquisite','yearning','zealous','achievement','boulevard',
    'catastrophe','distinctive','environment','fluctuate','guarantee',
    'hypothesis','illuminate','jurisdiction','kaleidoscope','legitimate',
    'melancholy','negotiate','occasional','phenomenon','quarantine',
    'revolutionary','sophisticated','theoretical','unprecedented',
    'vulnerability','whimsical','extraordinary','breathtaking','consequence',
    'deteriorate','equilibrium','fundamental','gravitational','hierarchical',
    'immaculate','labyrinthine','meticulous','notorious','orchestrate'
  ]
};

// ─── State ────────────────────────────────────────────────────
let difficulty = 'easy';
let timeLimit = 15;
let words = [];
let wordIndex = 0;
let charIndex = 0;
let started = false;
let finished = false;
let timer = null;
let timeLeft = 15;
let totalTyped = 0;
let totalErrors = 0;
let correctWords = 0;
let startTime = null;

// ─── Init ─────────────────────────────────────────────────────
function init() {
  words = generateWords(80);
  wordIndex = 0;
  charIndex = 0;
  started = false;
  finished = false;
  totalTyped = 0;
  totalErrors = 0;
  correctWords = 0;
  startTime = null;
  timeLeft = timeLimit;
  clearInterval(timer);

  document.getElementById('wpm-val').textContent = '—';
  document.getElementById('acc-val').textContent = '—';
  document.getElementById('words-val').textContent = '0';
  document.getElementById('chars-val').textContent = '0';
  document.getElementById('timer-display').textContent = formatTime(timeLeft);
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('text-box').classList.remove('focused','error');
  document.getElementById('hidden-input').value = '';
  setTimerRing(1);

  renderWords();
  document.getElementById('start-hint').classList.remove('hidden');
}

function generateWords(count) {
  const bank = WORDS[difficulty];
  const arr = [];
  for (let i = 0; i < count; i++) {
    arr.push(bank[Math.floor(Math.random() * bank.length)]);
  }
  return arr;
}

function renderWords() {
  const display = document.getElementById('word-display');
  display.innerHTML = '';
  words.forEach((word, wi) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.id = 'word-' + wi;
    word.split('').forEach((ch, ci) => {
      const c = document.createElement('span');
      c.className = 'char pending';
      c.id = `c-${wi}-${ci}`;
      c.textContent = ch;
      span.appendChild(c);
    });
    display.appendChild(span);
  });
  // place cursor
  placeCursor();
}

function placeCursor() {
  document.querySelectorAll('.cursor').forEach(el => el.remove());
  const cur = document.getElementById(`c-${wordIndex}-${charIndex}`);
  if (cur) {
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    cur.parentNode.insertBefore(cursor, cur);
  } else {
    // end of word
    const wordEl = document.getElementById('word-' + wordIndex);
    if (wordEl) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      wordEl.appendChild(cursor);
    }
  }
  scrollToWord(wordIndex);
}

function scrollToWord(wi) {
  const el = document.getElementById('word-' + wi);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─── Input handling ───────────────────────────────────────────
document.getElementById('hidden-input').addEventListener('input', handleInput);
document.getElementById('hidden-input').addEventListener('keydown', handleKeydown);
document.addEventListener('keydown', e => {
  if (e.key === 'Tab') { e.preventDefault(); focusInput(); }
});

function focusInput() {
  document.getElementById('hidden-input').focus();
  document.getElementById('start-hint').classList.add('hidden');
  document.getElementById('text-box').classList.add('focused');
}

function handleKeydown(e) {
  if (finished) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (charIndex > 0) {
      charIndex--;
      const c = document.getElementById(`c-${wordIndex}-${charIndex}`);
      if (c) c.className = 'char pending';
    }
    placeCursor();
    document.getElementById('hidden-input').value = '';
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (charIndex === 0) return;
    // advance word
    const word = words[wordIndex];
    // mark remaining chars as errors if any
    for (let i = charIndex; i < word.length; i++) {
      const c = document.getElementById(`c-${wordIndex}-${i}`);
      if (c && c.className.includes('pending')) {
        c.className = 'char wrong';
        totalErrors++;
      }
    }
    // count word correct
    let wordCorrect = true;
    for (let i = 0; i < word.length; i++) {
      const c = document.getElementById(`c-${wordIndex}-${i}`);
      if (c && c.className.includes('wrong')) { wordCorrect = false; break; }
    }
    if (wordCorrect) correctWords++;

    wordIndex++;
    charIndex = 0;
    document.getElementById('hidden-input').value = '';
    document.getElementById('words-val').textContent = correctWords;
    updateProgress();
    placeCursor();
  }
}

function handleInput(e) {
  if (finished) return;
  const input = document.getElementById('hidden-input');
  const val = input.value;
  if (val === ' ') { input.value = ''; return; }

  if (!started) startTest();

  const char = val[val.length - 1];
  if (!char || char === ' ') return;

  const word = words[wordIndex];
  if (charIndex >= word.length) { input.value = ''; return; }

  const expected = word[charIndex];
  const cel = document.getElementById(`c-${wordIndex}-${charIndex}`);
  if (!cel) return;

  totalTyped++;
  if (char === expected) {
    cel.className = 'char correct';
    document.getElementById('text-box').classList.remove('error');
  } else {
    cel.className = 'char wrong';
    totalErrors++;
    document.getElementById('text-box').classList.add('error');
    setTimeout(() => document.getElementById('text-box').classList.remove('error'), 200);
  }
  charIndex++;
  input.value = '';
  document.getElementById('chars-val').textContent = totalTyped;
  placeCursor();
  updateStats();
}

// ─── Timer ────────────────────────────────────────────────────
function startTest() {
  started = true;
  startTime = Date.now();
  timer = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  document.getElementById('timer-display').textContent = formatTime(timeLeft);
  setTimerRing(timeLeft / timeLimit);
  if (timeLeft <= 5) {
    document.getElementById('timer-display').style.color = 'var(--red)';
    document.querySelector('.timer-fg').style.stroke = 'var(--red)';
  } else if (timeLeft <= timeLimit * 0.3) {
    document.querySelector('.timer-fg').style.stroke = 'var(--yellow)';
  }
  if (timeLeft <= 0) endTest();
}

function setTimerRing(fraction) {
  const circ = 2 * Math.PI * 23;
  const offset = circ * (1 - fraction);
  document.getElementById('timer-ring').style.strokeDasharray = circ;
  document.getElementById('timer-ring').style.strokeDashoffset = offset;
}

function formatTime(s) {
  if (s >= 60) return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  return s + 's';
}

// ─── Stats ────────────────────────────────────────────────────
function updateStats() {
  if (!started || !startTime) return;
  const elapsed = (Date.now() - startTime) / 60000;
  const wpm = elapsed > 0 ? Math.round(correctWords / elapsed) : 0;
  const acc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;

  const wpmEl = document.getElementById('wpm-val');
  wpmEl.textContent = wpm;
  wpmEl.className = 'stat-val ' + (wpm >= 60 ? 'green' : wpm >= 30 ? 'yellow' : 'red');

  const accEl = document.getElementById('acc-val');
  accEl.textContent = acc + '%';
  accEl.className = 'stat-val ' + (acc >= 95 ? 'green' : acc >= 80 ? 'yellow' : 'red');
}

function updateProgress() {
  const pct = Math.min((wordIndex / words.length) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─── End ──────────────────────────────────────────────────────
function endTest() {
  clearInterval(timer);
  finished = true;
  document.getElementById('text-box').classList.remove('focused');

  const elapsed = Math.max((Date.now() - startTime) / 60000, 0.001);
  const finalWpm = Math.round(correctWords / elapsed);
  const finalAcc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;

  document.getElementById('res-wpm').textContent = finalWpm;
  document.getElementById('res-acc').textContent = finalAcc + '%';
  document.getElementById('res-words').textContent = correctWords;
  document.getElementById('res-errors').textContent = totalErrors;

  const grade = getGrade(finalWpm, finalAcc);
  document.getElementById('res-grade').innerHTML =
    `<span class="grade-badge" style="background:${grade.bg};color:${grade.color}">${grade.label}</span>`;
  document.getElementById('res-title').textContent = grade.emoji + ' ' + grade.title;
  document.getElementById('res-sub').textContent = `${difficulty.toUpperCase()} · ${timeLimit}s · ${grade.msg}`;

  setTimeout(() => document.getElementById('results-overlay').classList.add('show'), 400);
}

function getGrade(wpm, acc) {
  if (wpm >= 80 && acc >= 95) return { label:'S', emoji:'🏆', title:'Legendary!', msg:'You type like a machine.', bg:'rgba(124,58,237,0.25)', color:'#c4b5fd' };
  if (wpm >= 60 && acc >= 90) return { label:'A', emoji:'🎯', title:'Excellent!', msg:'Great speed and accuracy.', bg:'rgba(16,185,129,0.2)', color:'#6ee7b7' };
  if (wpm >= 40 && acc >= 85) return { label:'B', emoji:'👍', title:'Good Job!', msg:'Solid performance.', bg:'rgba(6,182,212,0.2)', color:'#67e8f9' };
  if (wpm >= 25 && acc >= 75) return { label:'C', emoji:'📈', title:'Keep Going!', msg:'Room to grow.', bg:'rgba(245,158,11,0.2)', color:'#fcd34d' };
  return { label:'D', emoji:'💪', title:'Keep Practicing!', msg:'Practice makes perfect.', bg:'rgba(244,63,94,0.15)', color:'#fda4af' };
}

// ─── Controls ─────────────────────────────────────────────────
function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('[data-diff]').forEach(el => {
    el.className = 'chip' + (el.dataset.diff === d ? ' active' : '');
  });
  newTest();
}

function setTime(t) {
  timeLimit = t;
  document.querySelectorAll('[data-time]').forEach(el => {
    el.className = 'chip' + (parseInt(el.dataset.time) === t ? ' active-time' : '');
  });
  newTest();
}

function restartTest() { init(); }
function newTest() { init(); }
function closeResults() { document.getElementById('results-overlay').classList.remove('show'); }

// ─── Keyboard shortcut ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeResults();
  if (e.ctrlKey && e.key === 'r') { e.preventDefault(); newTest(); }
});

// ─── Start ────────────────────────────────────────────────────
init();
</script>
</body>
</html>
